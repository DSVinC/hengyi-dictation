<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>恒一听写系统</title>
  <link rel="stylesheet" href="css/style.css?v=0.7.4">
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="navbar">
    <button class="nav-btn active" data-page="dictation">听写模式</button>
    <button class="nav-btn" data-page="vocabulary">词库管理</button>
    <button class="nav-btn" data-page="progress">进度总览</button>
    <span id="sync-status" class="sync-status idle" title="云端同步状态">☁️</span>
  </nav>

  <!-- 全局加载状态 -->
  <div id="global-loading">
    <div class="loading-spinner"></div>
    <span class="loading-text">加载中...</span>
  </div>

  <!-- 全局错误提示 -->
  <div id="global-error">
    <span class="error-icon">⚠️</span>
    <span class="error-text"></span>
    <button class="error-close" onclick="hideError()">×</button>
  </div>

  <!-- 主内容区 -->
  <main class="container" id="main-content">
    <!-- 内容由 js/app.js 动态渲染 -->
  </main>

  <script src="js/settings.js?v=0.7.4"></script>
  <script src="js/progress-store.js?v=0.7.4"></script>
  <script src="js/app.js?v=0.7.4"></script>
</body>
</html>
